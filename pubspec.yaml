name: my_invoice
description: A complete production-ready invoice management Flutter app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # File & Storage
  path_provider: ^2.1.2
  share_plus: ^7.2.2

  # Signature
  signature: ^5.4.1

  # Image Picker (for company logo)
  image_picker: ^1.0.7

  # UI Components
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_slidable: ^3.0.1
  fl_chart: ^0.66.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
